<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Explore - Pathukkalam</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f0f2f5;
    padding-bottom:80px;
}

/* HEADER */

.header{
    background:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:1000;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
    font-size:26px;
    font-weight:bold;
    color:#1877f2;
}

.header-icons i{
    font-size:22px;
    margin-left:18px;
    color:#444;
}

/* PAGE TITLE */

.page-title{
    padding:15px;
    font-size:22px;
    font-weight:bold;
}

/* POSTS */

.post{
    background:white;
    margin:10px;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.post-header{
    display:flex;
    align-items:center;
    padding:12px;
}

.post-header img{
    width:45px;
    height:45px;
    border-radius:50%;
    margin-right:10px;
}

.post-user{
    font-weight:bold;
}

.post-time{
    font-size:12px;
    color:gray;
}

.post-text{
    padding:0 12px 12px;
    line-height:1.5;
}

.post-image{
    width:100%;
    max-height:450px;
    object-fit:cover;
}

.post-actions{
    display:flex;
    justify-content:space-around;
    padding:12px;
    border-top:1px solid #eee;
}

.post-actions div{
    color:#555;
    font-size:14px;
}

/* BOTTOM NAVIGATION */

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #ddd;
    z-index:1000;
}

.nav-item{
    text-decoration:none;
    color:gray;
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
}

.nav-item i{
    font-size:22px;
    margin-bottom:4px;
}

.active{
    color:#1877f2;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

    <div class="logo">Pathukkalam</div>

    <div class="header-icons">
        <i class="fas fa-search"></i>
        <i class="fas fa-message"></i>
    </div>

</div>

<!-- TITLE -->

<div class="page-title">
    Explore Trending Posts 🔥
</div>

<!-- POSTS -->

{% for post in posts %}

<div class="post">

    <div class="post-header">

        <img src="{{ post.profile }}">

        <div>
            <div class="post-user">{{ post.name }}</div>
            <div class="post-time">Trending Now</div>
        </div>

    </div>

    <div class="post-text">
        {{ post.caption }}
    </div>

    <img class="post-image" src="{{ post.image }}">

    <div class="post-actions">

        <div><i class="far fa-thumbs-up"></i> Like</div>

        <div><i class="far fa-comment"></i> Comment</div>

        <div><i class="far fa-share-square"></i> Share</div>

    </div>

</div>

{% endfor %}

<!-- BOTTOM NAVIGATION -->

<div class="bottom-nav">

    <a href="/" class="nav-item">
        <i class="fas fa-house"></i>
        <span>Home</span>
    </a>

    <a href="/explore" class="nav-item active">
        <i class="fas fa-compass"></i>
        <span>Explore</span>
    </a>

    <a href="/notifications" class="nav-item">
        <i class="fas fa-bell"></i>
        <span>Alerts</span>
    </a>

    <a href="/profile" class="nav-item">
        <i class="fas fa-user"></i>
        <span>Profile</span>
    </a>

</div>

</body>
</html>
