<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>YouTube Shorts</title>

<style>

body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.open-btn{
    background:red;
    color:white;
    padding:18px 30px;
    border:none;
    border-radius:14px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

</style>

</head>

<body>

<button class="open-btn"
onclick="openShorts()">

    ▶ Open YouTube Shorts

</button>

<script>

function openShorts(){

    window.location.href =
    "https://m.youtube.com/shorts/";

}

</script>

</body>

</html>
