<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Pathukkalam</title>

<link rel="manifest"
href="{{ url_for('static', filename='manifest.json') }}">

<meta name="theme-color"
content="#1877f2">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f0f2f5;
    padding-bottom:90px;
}

/* HEADER */

.header{
    background:white;
    padding:14px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:1000;
    box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.logo-section{
    display:flex;
    align-items:center;
}

.logo-img{
    width:42px;
    height:42px;
    border-radius:12px;
    margin-right:10px;
    object-fit:cover;
}

.logo-text{
    font-size:26px;
    font-weight:bold;
    color:#1877f2;
}

.header-icons{
    display:flex;
    align-items:center;
}

.header-icons i{
    width:40px;
    height:40px;
    background:#f0f2f5;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-left:10px;
    color:#333;
    font-size:18px;
}

/* CREATE POST */

.create-post{
    background:white;
    margin-top:10px;
    padding:14px;
}

.create-top{
    display:flex;
    align-items:center;
}

.create-top img{
    width:45px;
    height:45px;
    border-radius:50%;
    margin-right:10px;
}

.create-top input{
    flex:1;
    border:none;
    background:#f0f2f5;
    padding:12px;
    border-radius:25px;
    outline:none;
    font-size:15px;
}

/* QUICK MENU */

.quick-menu{
    display:flex;
    justify-content:space-around;
    padding:10px 5px;
    gap:5px;
}

.quick-card{
    text-decoration:none;
    color:#333;
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
}

.quick-card i{
    font-size:22px;
    margin-bottom:5px;
}

/* STORIES */

.stories{
    display:flex;
    overflow-x:auto;
    padding:10px;
    gap:10px;
}

.story{
    min-width:90px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.story img{
    width:100%;
    height:110px;
    object-fit:cover;
}

.story p{
    padding:8px;
    text-align:center;
    font-size:13px;
    font-weight:bold;
}

/* POSTS */

.post{
    background:white;
    margin-top:10px;
    padding:12px;
}

.post-header{
    display:flex;
    align-items:center;
    margin-bottom:10px;
}

.post-header img{
    width:48px;
    height:48px;
    border-radius:50%;
    margin-right:10px;
}

.post-user{
    font-weight:bold;
    font-size:15px;
}

.post-time{
    font-size:12px;
    color:gray;
    margin-top:2px;
}

.post-text{
    margin-bottom:12px;
    line-height:1.5;
    color:#222;
}

.post-image{
    width:100%;
    border-radius:12px;
    max-height:500px;
    object-fit:cover;
}

.post-actions{
    display:flex;
    justify-content:space-around;
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid #eee;
}

.post-actions div{
    color:#555;
    font-size:14px;
}

/* FLOATING BUTTON */

.new-post-btn{
    position:fixed;
    bottom:28px;
    left:50%;
    transform:translateX(-50%);
    width:62px;
    height:62px;
    border-radius:50%;
    background:linear-gradient(135deg,#1877f2,#42a5ff);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:28px;
    text-decoration:none;
    box-shadow:0 5px 15px rgba(24,119,242,0.4);
    z-index:2000;
    border:4px solid white;
}

/* BOTTOM NAV */

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:white;
    display:flex;
    justify-content:space-evenly;
    align-items:center;
    padding:10px 0;
    border-top:1px solid #ddd;
    z-index:1000;
}

.nav-item{
    text-decoration:none;
    color:gray;
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
}

.nav-item i{
    font-size:22px;
    margin-bottom:4px;
}

.active{
    color:#1877f2;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

    <div class="logo-section">

        <img class="logo-img"
        src="{{ url_for('static', filename='icon-192.png') }}">

        <div class="logo-text">
            Pathukkalam
        </div>

    </div>

    <div class="header-icons">

        <i class="fas fa-search"></i>

        <a href="/messages"
        style="text-decoration:none;color:inherit;">

            <i class="fas fa-message"></i>

        </a>

    </div>

</div>

<!-- CREATE POST -->

<div class="create-post">

    <div class="create-top">

        <img src="https://i.pravatar.cc/150?img=10">

        <input type="text"
        placeholder="What's happening in Pathukkalam?">

    </div>

</div>

<!-- QUICK MENU -->

<div class="quick-menu">

    <a href="/rides" class="quick-card">
    
        <div style="display:flex;gap:4px;align-items:center;">
    
            <i class="fas fa-car-side"></i>
    
            <i class="fas fa-motorcycle"></i>
    
        </div>
    
        <div>Ride Share</div>
    
    </a>

    <a href="/marketplace" class="quick-card">

        <i class="fas fa-store"></i>

        <div>Marketplace</div>

    </a>

    <a href="/reels" class="quick-card">

        <i class="fas fa-video"></i>

        <div>Reels</div>

    </a>

    <a href="/jobs" class="quick-card">

        <i class="fas fa-briefcase"></i>

        <div>Jobs</div>

    </a>

</div>

<!-- STORIES -->

<div class="stories">

    <div class="story">
        <img src="https://picsum.photos/200/300?1">
        <p>Arun</p>
    </div>

    <div class="story">
        <img src="https://picsum.photos/200/300?2">
        <p>Rahul</p>
    </div>

    <div class="story">
        <img src="https://picsum.photos/200/300?3">
        <p>Priya</p>
    </div>

    <div class="story">
        <img src="https://picsum.photos/200/300?4">
        <p>Vijay</p>
    </div>

</div>

<!-- POSTS -->

{% for post in posts %}

<div class="post">

    <div class="post-header">

        <a href="/profile/{{ post.username }}">

            <img src="{{ post.profile }}">

        </a>

        <div>

            <a href="/profile/{{ post.username }}"
            style="text-decoration:none;color:inherit;">

                <div class="post-user">
                    {{ post.name }}
                </div>

            </a>

            <div class="post-time">
                Trending Now
            </div>

        </div>

    </div>

    <div class="post-text">
        {{ post.caption }}
    </div>

    <img class="post-image"
    src="{{ post.image }}">

    <div class="post-actions">

        <div>
            <i class="far fa-thumbs-up"></i>
            Like
        </div>

        <div>
            <i class="far fa-comment"></i>
            Comment
        </div>

        <div>
            <i class="far fa-share-square"></i>
            Share
        </div>

    </div>

</div>

{% endfor %}

<!-- FLOATING BUTTON -->

<a href="/new-post" class="new-post-btn">

    <i class="fas fa-plus"></i>

</a>

<!-- BOTTOM NAVIGATION -->

<div class="bottom-nav">

    <a href="/" class="nav-item active">

        <i class="fas fa-house"></i>

        <span>Home</span>

    </a>

    <a href="/explore" class="nav-item">

        <i class="fas fa-compass"></i>

        <span>Explore</span>

    </a>

    <a href="/notifications" class="nav-item">

        <i class="fas fa-bell"></i>

        <span>Alerts</span>

    </a>

    <a href="/profile/sudhakar" class="nav-item">

        <i class="fas fa-user"></i>

        <span>Profile</span>

    </a>

</div>

<!-- SERVICE WORKER -->

<script>

if ('serviceWorker' in navigator) {

    window.addEventListener('load', function() {

        navigator.serviceWorker.register('/static/sw.js')

        .then(function(registration) {

            console.log('Service Worker Registered');

        })

        .catch(function(error) {

            console.log('Service Worker Failed', error);

        });

    });

}

</script>

</body>
</html>
