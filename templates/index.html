<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta http-equiv="Content-Language" content="en">
    
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pathukkalam</title>

<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<div class="navbar">

    <div class="logo">PATHUKKALAM</div>

    <div class="menu">
        <a href="/">Home</a>
        <a href="/explore">Explore</a>
        <a href="/notifications">Alerts</a>
        <a href="/profile">Profile</a>
    </div>

</div>

<div class="story-wrapper">

    <div class="story">Sudhakar</div>
    <div class="story">Arun</div>
    <div class="story">Vijay</div>
    <div class="story">Kumar</div>
    <div class="story">Raj</div>

</div>

<div class="feed">

{% for post in posts %}

<div class="post-card">

    <div class="post-top">
        <img src="https://i.pravatar.cc/100?img={{ loop.index }}">

        <div>
            <div class="name">{{ post.name }}</div>
            <div class="username">{{ post.username }}</div>
        </div>
    </div>

    <div class="caption">
        {{ post.caption }}
    </div>

    <img class="post-image" src="{{ post.image }}">

    <div class="actions">
        <button>❤️ Like</button>
        <button>💬 Comment</button>
        <button>📤 Share</button>
    </div>

</div>

{% endfor %}

</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
