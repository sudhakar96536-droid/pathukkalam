<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ride Share</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f0f2f5;
}

.header{
    background:#1877f2;
    color:white;
    padding:18px;
    font-size:22px;
    font-weight:bold;
    text-align:center;
}

.ride-card{
    background:white;
    margin:15px;
    padding:18px;
    border-radius:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.location{
    font-size:18px;
    margin-bottom:10px;
    font-weight:bold;
}

.price{
    color:green;
    font-size:22px;
    font-weight:bold;
    margin-top:10px;
}

.book-btn{
    width:100%;
    padding:14px;
    border:none;
    background:#1877f2;
    color:white;
    border-radius:10px;
    margin-top:15px;
    font-size:16px;
}

</style>

</head>

<body>

<div class="header">
    🚖 Pathukkalam Ride Share
</div>

<div class="ride-card">

    <div class="location">
        Chennai → Tambaram
    </div>

    <div>
        Driver: Arun
    </div>

    <div class="price">
        ₹120
    </div>

    <button class="book-btn">
        Book Ride
    </button>

</div>

<div class="ride-card">

    <div class="location">
        Velachery → T Nagar
    </div>

    <div>
        Driver: Vijay
    </div>

    <div class="price">
        ₹90
    </div>

    <button class="book-btn">
        Book Ride
    </button>

</div>

</body>

</html>
