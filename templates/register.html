<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - Pathukkalam</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.register-box{
    width:100%;
    max-width:420px;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo img{
    width:80px;
    height:80px;
    border-radius:18px;
    margin-bottom:12px;
}

.logo h1{
    color:#1877f2;
    font-size:32px;
}

.logo p{
    color:gray;
    margin-top:5px;
}

.input-box{
    margin-top:18px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:bold;
    color:#444;
}

.input-box input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    outline:none;
    font-size:15px;
}

.input-box input:focus{
    border-color:#1877f2;
}

.register-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#1877f2;
    color:white;
    font-size:16px;
    font-weight:bold;
    margin-top:22px;
    cursor:pointer;
}

.register-btn:hover{
    background:#1669d8;
}

.bottom-text{
    text-align:center;
    margin-top:18px;
    color:#555;
    font-size:14px;
}

.bottom-text a{
    color:#1877f2;
    text-decoration:none;
    font-weight:bold;
}

.features{
    margin-top:25px;
    background:#f7f9fc;
    padding:15px;
    border-radius:14px;
}

.features div{
    margin-bottom:10px;
    color:#444;
    font-size:14px;
}

.features i{
    color:#1877f2;
    margin-right:8px;
}

</style>

</head>

<body>

<div class="register-box">

    <div class="logo">

        <img src="{{ url_for('static', filename='icon-192.png') }}">

        <h1>Pathukkalam</h1>

        <p>All In One Social Platform 🚀</p>

    </div>

    <form>

        <div class="input-box">

            <label>Full Name</label>

            <input type="text"
            placeholder="Enter your full name">

        </div>

        <div class="input-box">

            <label>Username</label>

            <input type="text"
            placeholder="@username">

        </div>

        <div class="input-box">

            <label>Mobile Number</label>

            <input type="text"
            placeholder="Enter mobile number">

        </div>

        <div class="input-box">

            <label>Email Address</label>

            <input type="email"
            placeholder="Enter email">

        </div>

        <div class="input-box">

            <label>Password</label>

            <input type="password"
            placeholder="Create password">

        </div>

        <button class="register-btn">
            Create Account
        </button>

    </form>

    <div class="features">

        <div>
            <i class="fas fa-users"></i>
            Social Media Platform
        </div>

        <div>
            <i class="fas fa-car"></i>
            Ride Share System
        </div>

        <div>
            <i class="fas fa-store"></i>
            Marketplace
        </div>

        <div>
            <i class="fas fa-video"></i>
            Reels & Viral Content
        </div>

        <div>
            <i class="fas fa-briefcase"></i>
            Jobs & Opportunities
        </div>

    </div>

    <div class="bottom-text">

        Already have an account?

        <a href="/login">
            Login
        </a>

    </div>

</div>

</body>
</html>
