<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pathukkalam News</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f0f2f5;
    padding-bottom:100px;
}

.header{
    background:#1877f2;
    color:white;
    padding:18px;
    font-size:24px;
    font-weight:bold;
    position:sticky;
    top:0;
    z-index:1000;
}

.news-container{
    padding:15px;
}

.news-card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    margin-bottom:18px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.news-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.news-content{
    padding:15px;
}

.news-title{
    font-size:19px;
    font-weight:bold;
    margin-bottom:10px;
    line-height:1.4;
}

.news-desc{
    color:#555;
    font-size:14px;
    line-height:1.6;
    margin-bottom:14px;
}

.news-footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.news-date{
    color:gray;
    font-size:13px;
}

.read-btn{
    background:#ffcc00;
    color:black;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.loader{
    text-align:center;
    margin-top:50px;
    font-size:18px;
    color:gray;
}

</style>

</head>

<body>

<div class="header">
    📰 Pathukkalam News
</div>

<div class="news-container"
id="newsContainer">

    <div class="loader">
        Loading latest news...
    </div>

</div>

<script>

async function loadNews(){

    let container =
    document.getElementById("newsContainer");

    try{

        let response = await fetch(
        "https://gnews.io/api/v4/top-headlines?lang=en&country=in&max=10&apikey=3d7b0c1f3d8b4b66aef3f5f9f3e5d111"
        );

        let data = await response.json();

        container.innerHTML = "";

        data.articles.forEach(news => {

            container.innerHTML += `

            <div class="news-card">

                <img src="${news.image || 'https://picsum.photos/500/300'}">

                <div class="news-content">

                    <div class="news-title">
                        ${news.title}
                    </div>

                    <div class="news-desc">
                        ${news.description || 'No description available'}
                    </div>

                    <div class="news-footer">

                        <div class="news-date">
                            ${new Date(news.publishedAt).toDateString()}
                        </div>

                        <button class="read-btn"
                        onclick="openNews('${news.url}')">

                            Read News

                        </button>

                    </div>

                </div>

            </div>

            `;

        });

    }catch(error){

        container.innerHTML = `

        <div class="loader">
            Failed to load news
        </div>

        `;

    }

}

function openNews(url){

    window.location.href = url;

}

loadNews();

</script>

</body>
</html>
